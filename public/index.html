<style>
:root {
  --bg-main: #070b14;
  --bg-section: #0d1424;
  --bg-card: #121b30;
  --primary: #00d1b2;
  --secondary: #4f8cff;
  --accent: #f4c430;
  --text-main: #f5f7fb;
  --text-muted: #b8c1d9;
}

body {
  margin: 0;
  font-family: "Inter", "Segoe UI", sans-serif;
  background: var(--bg-main);
  color: var(--text-main);
  scroll-behavior: smooth;
}

/* HERO */
.hero {
  min-height: 100vh;
  background:
    radial-gradient(circle at top right, rgba(79,140,255,0.15), transparent 40%),
    linear-gradient(135deg, #0b1220, #0a1f2e);
  display: flex;
  align-items: center;
  padding: 90px;
  position: relative;
  overflow: hidden;
}

.hero h1 {
  font-size: 56px;
  line-height: 1.15;
  font-weight: 700;
}

.hero span {
  color: var(--primary);
}

.hero p {
  font-size: 18px;
  max-width: 680px;
  margin-top: 22px;
  color: var(--text-muted);
}

.hero button {
  margin-top: 35px;
  padding: 18px 38px;
  border-radius: 50px;
  border: none;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  color: #001018;
  box-shadow: 0 15px 40px rgba(0,209,178,0.25);
}

.hero-images {
  position: absolute;
  right: -120px;
  display: flex;
  gap: 24px;
  animation: float 20s infinite ease-in-out;
}

.hero-images img {
  width: 260px;
  border-radius: 22px;
  box-shadow: 0 30px 60px rgba(0,0,0,0.6);
}

@keyframes float {
  0% { transform: translateY(0); }
  50% { transform: translateY(-60px); }
  100% { transform: translateY(0); }
}

/* SECTIONS */
section {
  padding: 90px;
  background: var(--bg-section);
}

h2 {
  font-size: 38px;
  margin-bottom: 26px;
  color: var(--primary);
}

/* SERVICE CARDS */
.service {
  background: linear-gradient(180deg, var(--bg-card), #0b1324);
  padding: 36px;
  border-radius: 22px;
  margin-bottom: 34px;
  box-shadow: 0 25px 60px rgba(0,0,0,0.45);
}

.service p {
  color: var(--text-muted);
  line-height: 1.75;
  font-size: 16px;
}

/* REVIEWS */
.reviews {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(260px,1fr));
  gap: 28px;
}

.review {
  background: linear-gradient(180deg, var(--bg-card), #0a1222);
  padding: 28px;
  border-radius: 22px;
  box-shadow: 0 20px 45px rgba(0,0,0,0.4);
}

.review strong {
  color: var(--accent);
}

.review img {
  width: 64px;
  border-radius: 50%;
  margin-bottom: 12px;
}

/* CALCULATOR */
.calculator {
  background: linear-gradient(160deg, #0d162b, #0a1e33);
  padding: 45px;
  border-radius: 24px;
  max-width: 520px;
  box-shadow: 0 30px 70px rgba(0,0,0,0.6);
}

/* AI BOT */
.bot {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  color: #001018;
  padding: 16px 24px;
  border-radius: 50px;
  font-weight: 600;
  cursor: pointer;
  box-shadow: 0 15px 40px rgba(79,140,255,0.35);
}
</style>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Insurance Eligibility Verification</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f7f9fc;
}

.hero{
  height:70vh;
  background:url("https://images.unsplash.com/photo-1520607162513-77705c0f0d4a?auto=format&fit=crop&w=1600");
  background-size:cover;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
}

.hero h1{
  background:rgba(0,0,0,.6);
  padding:20px 40px;
  border-radius:14px;
  font-size:46px;
}

.features{
  padding:80px 8%;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:40px;
}

.feature{
  background:#fff;
  padding:30px;
  border-radius:18px;
  box-shadow:0 15px 35px rgba(0,0,0,.1);
  transition:.4s;
}

.feature:hover{
  transform:scale(1.05);
}
</style>
</head>

<body>

<div class="hero">
  <h1>Insurance Eligibility Verification</h1>
</div>

<section class="features">
  <div class="feature">
    <h3>Real-Time Checks</h3>
    <p>Instant eligibility confirmation before patient visits.</p>
  </div>

  <div class="feature">
    <h3>Authorization Tracking</h3>
    <p>Prevent denials by verifying authorizations early.</p>
  </div>

  <div class="feature">
    <h3>Reduced Denials</h3>
    <p>Lower rejection rates and faster reimbursements.</p>
  </div>
</section>

</body>
</html>
